<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathillda - Yönetim Paneli</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-color: #0d131a;
      --card-bg: #151f2b;
      --text-color: #f1f5f9;
      --accent-color: #d4af37;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 15px;
    }
    .container {
      max-width: 100%;
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      border: 1px solid rgba(212, 175, 55, 0.2);
      box-sizing: border-box;
    }
    h1, h2 {
      color: var(--accent-color);
      text-align: center;
      margin-top: 0;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--accent-color);
    }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #2e3e52;
      background-color: #0b1118;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background-color: var(--accent-color);
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      display: none;
    }
    .status.success { background-color: #1b4d3e; color: #5effbc; display: block; }
    .status.loading { background-color: #3b2c11; color: #ffd166; display: block; }
    .status.error { background-color: #4a1d1d; color: #ff9e9e; display: block; }
  </style>
</head>
<body>

<div class="container">
  <h1>MATHILLDA</h1>
  <h2>Yeni Ürün Ekle</h2>
  
  <div id="statusBox" class="status"></div>

  <div class="form-group">
    <label for="category">Kategori</label>
    <select id="category">
      <option value="Çikolata">Çikolata (Chocolate)</option>
      <option value="Pasta">Pasta (Cake)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="name_tr">Ürün Adı (Türkçe)</label>
    <input type="text" id="name_tr" placeholder="Örn: Safir Elmas Serisi">
  </div>

  <div class="form-group">
    <label for="price">Fiyat (EUR)</label>
    <input type="number" id="price" placeholder="Örn: 45">
  </div>

  <div class="form-group">
    <label for="description_tr">Ürün Açıklaması (Türkçe)</label>
    <textarea id="description_tr" rows="4" placeholder="Ürün özelliklerini yazın..."></textarea>
  </div>

  <div class="form-group">
    <label for="image">Ürün Görseli</label>
    <input type="file" id="image" accept="image/*">
  </div>

  <button onclick="saveProductAndTranslate()">Ürünü Çevir ve Kaydet</button>
</div>

<script>
  const SUPABASE_URL = "https://olzohyonqioucwtnkfya.supabase.co"; 
  const SUPABASE_ANON_KEY = "Sb_publishable_Q24NDXCNYJG87Io8Wb2l4g_fOvnaKJD"; 
  const DEEPL_API_KEY = "BURAYA_DEEPL_KEY_YAZIN"; // <-- Sadece DeepL Key'inizi buraya tırnakların içine yapıştırın

  const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showStatus(message, type) {
    const box = document.getElementById('statusBox');
    box.className = `status ${type}`;
    box.innerHTML = message;
  }

  async function translateText(text, targetLang) {
    if (!text) return "";
    try {
      const response = await fetch("https://api-free.deepl.com/v2/translate", {
        method: "POST",
        headers: {
          "Authorization": `DeepL-Auth-Key ${DEEPL_API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: [text], target_lang: targetLang })
      });
      const data = await response.json();
      return data.translations[0].text;
    } catch (err) {
      console.error(err);
      return "";
    }
  }

  async function saveProductAndTranslate() {
    const category = document.getElementById('category').value;
    const name_tr = document.getElementById('name_tr').value;
    const price = document.getElementById('price').value;
    const description_tr = document.getElementById('description_tr').value;
    const imageFile = document.getElementById('image').files[0];

    if (!name_tr || !price || !description_tr || !imageFile) {
      showStatus("Lütfen tüm alanları doldurun ve bir görsel seçin!", "error");
      return;
    }

    if (DEEPL_API_KEY === "BURAYA_DEEPL_KEY_YAZIN") {
      showStatus("Lütfen kodun içindeki 'BURAYA_DEEPL_KEY_YAZIN' alanına kendi DeepL anahtarınızı yazın!", "error");
      return;
    }

    showStatus("Görsel yükleniyor ve çeviriler yapılıyor... Lütfen bekleyin.", "loading");

    try {
      const fileExt = imageFile.name.split('.').pop();
      const fileName = `${Date.now()}.${fileExt}`;
      const filePath = `product-images/${fileName}`;

      const { data: uploadData, error: uploadError } = await supabase.storage
        .from('images')
        .upload(filePath, imageFile);

      if (uploadError) throw uploadError;

      const { data: { publicUrl } } = supabase.storage
        .from('images')
        .getPublicUrl(filePath);

      const languages = ['DE', 'EN', 'FR', 'IT', 'ES', 'RU', 'AR'];
      const translations = {};

      for (const lang of languages) {
        showStatus(`Türkçe içerik ${lang} diline çevriliyor...`, "loading");
        const lowerLang = lang.toLowerCase();
        translations[`name_${lowerLang}`] = await translateText(name_tr, lang);
        translations[`description_${lowerLang}`] = await translateText(description_tr, lang);
      }

      const { error: insertError } = await supabase
        .from('products')
        .insert([{
          category: category,
          price: parseFloat(price),
          image_url: publicUrl,
          name_tr: name_tr,
          description_tr: description_tr,
          ...translations
        }]);

      if (insertError) throw insertError;

      showStatus("Ürün başarıyla kaydedildi ve tüm dillere otomatik çevrildi! 🎉", "success");
      
      document.getElementById('name_tr').value = "";
      document.getElementById('price').value = "";
      document.getElementById('description_tr').value = "";
      document.getElementById('image').value = "";

    } catch (error) {
      showStatus(`Sistem Hatası: ${error.message}`, "error");
    }
  }
</script>
</body>
</html>
