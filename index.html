<style>
  :root{
    --ink:#0b0f14;
    --panel:#12181f;
    --panel2:#171f28;
    --gold:#d4af37;
    --gold-light:#f0d78c;
    --cocoa:#3b2013;
    --cream:#f4ead9;
    --line:rgba(212,175,55,0.18);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--cream);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;margin:0;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  [dir="rtl"] .lang-select{direction:ltr;}

  /* HEADER */
  header{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px;
    background:linear-gradient(to bottom, rgba(11,15,20,0.95), rgba(11,15,20,0));
  }
  .wordmark{font-family:'Cormorant Garamond',serif; font-size:22px; letter-spacing:3px; color:var(--gold-light);}
  select.lang-select{
    background:var(--panel); color:var(--cream);
    border:1px solid var(--line); border-radius:6px;
    padding:6px 10px; font-family:'JetBrains Mono',monospace; font-size:13px;
  }

  /* HERO */
  .hero{
    position:relative; height:100svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    overflow:hidden; padding:0 20px;
  }
  #marbleCanvas{position:absolute; inset:0; width:100%; height:100%; opacity:0.55;}
  .hero-content{position:relative; z-index:2; max-width:600px;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:2px;
    color:var(--gold); opacity:0.85; margin-bottom:18px;
  }
  .hero h1{font-size:clamp(32px,7vw,52px); line-height:1.15; color:var(--cream);}
  .hero p{margin-top:18px; font-size:16px; color:#c8bfae; line-height:1.6;}
  .scroll-cue{
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    width:1px; height:36px; background:var(--gold); opacity:0.5;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:0.15;}50%{opacity:0.6;}}

  /* ABOUT */
  section{padding:70px 20px; max-width:720px; margin:0 auto;}
  .about-title{color:var(--gold); font-size:14px; letter-spacing:3px; text-transform:uppercase; font-family:'JetBrains Mono',monospace; margin-bottom:16px; text-align:center;}
  .about-text{font-size:18px; line-height:1.85; color:#e4dbc9; text-align:center;}

  /* CATEGORY TABS */
  .tabs-nav{
    position:sticky; top:0; z-index:30; display:flex; justify-content:center; gap:6px;
    background:var(--ink); padding:14px 20px; border-bottom:1px solid var(--line);
  }
  .tab-pill{
    background:transparent; border:1px solid var(--line); color:#a89b7c;
    padding:9px 18px; border-radius:20px; font-size:14px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .tab-pill.active{background:var(--gold); color:#1a1206; border-color:var(--gold); font-weight:600;}

  /* GALLERY */
  .gallery-wrap{max-width:960px; margin:0 auto; padding:40px 16px 70px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px;}
  .product-card{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    overflow:hidden; text-align:left;
  }
  .product-card img{width:100%; aspect-ratio:1/1; object-fit:cover; display:block;}
  .product-card .pc-body{padding:12px;}
  .product-card .pc-name{font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--cream);}
  .product-card .pc-price{font-family:'JetBrains Mono',monospace; color:var(--gold); font-size:13px; margin-top:6px;}
  .empty-msg,.loading-msg{grid-column:1/-1; text-align:center; color:#7a705c; padding:30px 0; font-size:14px;}

  /* CONTACT */
  .contact-section{text-align:center; border-top:1px solid var(--line);}
  .contact-buttons{display:flex; flex-direction:column; gap:12px; max-width:340px; margin:26px auto 0;}
  .btn{
    display:block; padding:14px; border-radius:8px; font-weight:600; font-size:15px;
    text-decoration:none;
  }
  .btn-whatsapp{background:#1fae5c; color:#fff;}
  .btn-email{background:var(--panel2); color:var(--cream); border:1px solid var(--line);}
  .social-row{display:flex; justify-content:center; gap:20px; margin-top:22px; font-size:14px;}
  .social-row a{color:#a89b7c; text-decoration:none; border-bottom:1px solid transparent;}
  .social-row a:hover{border-color:var(--gold); color:var(--gold);}

  footer{text-align:center; padding:26px 20px; font-size:12px; color:#5c5443; font-family:'JetBrains Mono',monospace; letter-spacing:1px;}

  /* Lightbox */
  #lightbox{
    position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:100;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  #lightbox img{max-width:100%; max-height:80vh; border-radius:8px;}
  #lightbox .lb-close{position:absolute; top:20px; right:24px; color:#fff; font-size:28px; background:none; border:none;}

  @media (prefers-reduced-motion: reduce){
    #marbleCanvas{display:none;}
    .scroll-cue{animation:none;}
  }

  async function loadProducts(){

    if(!error && data) allProducts = data;

  }

  function renderGallery(){
    const grid = document.getElementById('galleryGrid');
    const t = I18N[currentLang];
    const items = allProducts.filter(p => p.category === currentCategory);
    if(items.length === 0){
      grid.innerHTML = `<div class="empty-msg">${t.empty_text}</div>`;
      return;
    }
    grid.innerHTML = items.map(p => {
      const name = p[`name_${currentLang}`] || p.name_tr;
      return `
        <div class="product-card">
          <img src="${p.image_url}" alt="${name}" onclick="openLightbox('${p.image_url}')">
          <div class="pc-body">
            <div class="pc-name">${name}</div>
            <div class="pc-price mono">${p.price} EUR</div>
          </div>
        </div>`;
    }).join('');

  /* Marble / fluid dynamics hero canvas */
  (function initMarble(){
    const canvas = document.getElementById('marbleCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;
    function resize(){
      w = canvas.width = canvas.offsetWidth;
      h = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const blobs = Array.from({length: 5}, (_, i) => ({
      baseX: 0.2 + (i * 0.15),
      baseY: 0.3 + (i % 2 === 0 ? 0.15 : -0.1),
      r: 0.35 + i * 0.05,
      speed: 0.00025 + i * 0.00008,
      phase: i * 1.7,
      color: i % 2 === 0 ? '212,175,55' : '59,32,19'
    }));

    function draw(time){
      ctx.clearRect(0,0,w,h);
      blobs.forEach(b => {
        const x = (b.baseX + 0.06 * Math.sin(time * b.speed + b.phase)) * w;
        const y = (b.baseY + 0.06 * Math.cos(time * b.speed * 1.3 + b.phase)) * h;
        const r = b.r * Math.max(w,h);
        const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
        grad.addColorStop(0, `rgba(${b.color},0.35)`);
        grad.addColorStop(1, `rgba(${b.color},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
      requestAnimationFrame(draw);
    }
  })();
